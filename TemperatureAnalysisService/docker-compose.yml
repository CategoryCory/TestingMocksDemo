services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: demo-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
  
  postgres:
    image: postgres:18.3-bookworm
    container_name: demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: temperature_db
    ports:
      - "5432:5432"

  worker:
    build:
      context: ../
      dockerfile: TemperatureAnalysisService/src/Dockerfile
    container_name: temperature-worker
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_HOST: rabbitmq