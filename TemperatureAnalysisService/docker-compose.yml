services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: demo-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  worker:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: temperature-worker
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_HOST: rabbitmq